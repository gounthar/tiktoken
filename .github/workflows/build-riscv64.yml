name: Build riscv64 wheel

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Upstream release tag to build from'
        required: false
        type: string
  schedule:
    - cron: '0 2 * * 0'

jobs:
  build:
    runs-on: [self-hosted, linux, riscv64]
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Set up Python
        run: |
          python3 -m venv /tmp/build-venv
          . /tmp/build-venv/bin/activate
          pip install --upgrade pip setuptools wheel setuptools-rust

      - name: Build wheel
        run: |
          . /tmp/build-venv/bin/activate
          pip wheel --no-deps --wheel-dir /tmp/wheels/ .

      - name: Verify platform tag
        run: |
          for whl in /tmp/wheels/*.whl; do
            if echo "$whl" | grep -q "linux_riscv64"; then
              echo "OK: $whl"
            else
              echo "FAIL: $whl missing riscv64 tag"
              exit 1
            fi
          done

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-riscv64
          path: /tmp/wheels/*.whl
          retention-days: 90

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/build-venv /tmp/wheels

  release:
    needs: build
    runs-on: [self-hosted, linux, riscv64]
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel-riscv64
          path: /tmp/wheels/

      - name: Get wheel info
        id: wheel_info
        run: |
          WHL=$(ls /tmp/wheels/*.whl | head -1)
          BASENAME=$(basename "$WHL")
          # Extract version from wheel filename: name-version-cpXX-...
          VERSION=$(echo "$BASENAME" | sed 's/^[^-]*-\([^-]*\)-.*/\1/')
          echo "whl_path=$WHL" >> "$GITHUB_OUTPUT"
          echo "whl_name=$BASENAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        run: |
          cd /tmp/wheels
          sha256sum *.whl > SHA256SUMS

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="riscv64-v${{ steps.wheel_info.outputs.version }}"
          TITLE="riscv64 wheel v${{ steps.wheel_info.outputs.version }}"

          # Delete existing release with same tag if it exists
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # Create new release
          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "Prebuilt riscv64 wheel for $(uname -m) Linux.

          Built on: BananaPi F3 (SpacemiT K1, rv64imafdcv)
          Python: $(python3 --version 2>&1)
          Wheel: ${{ steps.wheel_info.outputs.whl_name }}

          Install:
          \`\`\`
          pip install tiktoken --find-links https://github.com/gounthar/tiktoken/releases/download/$TAG/
          \`\`\`" \
            /tmp/wheels/*.whl \
            /tmp/wheels/SHA256SUMS

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/wheels
  notify-index:
    needs: release
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Trigger index update
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          gh api repos/gounthar/riscv64-python-wheels/dispatches \
            -f event_type=fork-release-published \
            -f "client_payload[repo]=${{ github.repository }}" \
            -f "client_payload[tag]=${{ github.ref_name }}"
